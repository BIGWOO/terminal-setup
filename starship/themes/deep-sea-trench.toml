"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ŅéČ](surface0)\
$username\
$hostname\
[Ņé░](bg:green fg:surface0)\
$directory\
[Ņé░](bg:teal fg:green)\
$git_branch\
$git_status\
[Ņé░](fg:teal bg:overlay1)\
$php\
$python\
$golang\
$c\
$rust\
$java\
$kotlin\
$haskell\
[Ņé░](fg:overlay1 bg:lavender)\
$time\
[Ņé┤ ](fg:lavender)\
$cmd_duration\
$line_break\
$character"""

palette = 'bigwoo_deep_sea_trench'

[username]
show_always = false
style_user = "bg:surface0 fg:text"
style_root = "bg:surface0 fg:text"
format = '[ $user ]($style)'

[hostname]
disabled = false
ssh_only = false
trim_at = "."
style = "bg:surface0 fg:text"
format = '[ $hostname ]($style)'

[directory]
style = "bg:green fg:crust"
format = "[ $path ]($style)"
truncation_length = 4
truncate_to_repo = false
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Developer" = "¾░▓ŗ "

[git_branch]
symbol = "’Éś"
style = "bg:teal"
format = '[[ $symbol $branch ](fg:text bg:teal)]($style)'

[git_status]
style = "bg:teal"
format = '[[($all_status$ahead_behind )](fg:text bg:teal)]($style)'

[c]
symbol = "Ņś× "
style = "bg:overlay1"
format = '[[ $symbol( $version) ](fg:text bg:overlay1)]($style)'

[rust]
symbol = "Ņ×©"
style = "bg:overlay1"
format = '[[ $symbol( $version) ](fg:text bg:overlay1)]($style)'

[golang]
symbol = "Ņś¦"
style = "bg:overlay1"
format = '[[ $symbol( $version) ](fg:text bg:overlay1)]($style)'

[php]
symbol = "Ņśł"
style = "bg:overlay1"
format = '[[ $symbol( $version) ](fg:text bg:overlay1)]($style)'

[java]
symbol = "Ņē¢ "
style = "bg:overlay1"
format = '[[ $symbol( $version) ](fg:text bg:overlay1)]($style)'

[kotlin]
symbol = "Ņś┤"
style = "bg:overlay1"
format = '[[ $symbol( $version) ](fg:text bg:overlay1)]($style)'

[haskell]
symbol = "Ņś¤"
style = "bg:overlay1"
format = '[[ $symbol( $version) ](fg:text bg:overlay1)]($style)'

[python]
symbol = "Ņśå"
style = "bg:overlay1"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:text bg:overlay1)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:lavender"
format = '[[ ’É║ $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[ŌØ»](bold fg:green)'
error_symbol = '[ŌØ»](bold fg:red)'
vimcmd_symbol = '[ŌØ«](bold fg:green)'
vimcmd_replace_one_symbol = '[ŌØ«](bold fg:lavender)'
vimcmd_replace_symbol = '[ŌØ«](bold fg:lavender)'
vimcmd_visual_symbol = '[ŌØ«](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = "Ņ½┤ in $duration "
style = "fg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

