"$schema" = 'https://starship.rs/config-schema.json'

format = """
[¯éÂ](surface0)\
$username\
$hostname\
[¯é░](fg:surface0 bg:peach)\
$directory\
[¯é░](fg:peach bg:green)\
$git_branch\
