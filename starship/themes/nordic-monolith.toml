format = '[[ $symbol( $version) ](fg:text bg:mauve)]($style)'

[java]
symbol = "¯ëû "
style = "bg:mauve"
format = '[[ $symbol( $version) ](fg:text bg:mauve)]($style)'

[kotlin]
symbol = "¯ÿ┤"
style = "bg:mauve"
format = '[[ $symbol( $version) ](fg:text bg:mauve)]($style)'

[haskell]
symbol = "¯ÿƒ"
style = "bg:mauve"
format = '[[ $symbol( $version) ](fg:text bg:mauve)]($style)'

[python]
symbol = "¯ÿå"
style = "bg:mauve"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:text bg:mauve)]($style)'

[docker_context]
symbol = "´îê"
style = "bg:overlay1"
format = '[[ $symbol( $context) ](fg:text bg:overlay1)]($style)'

[conda]
symbol = " ´äî "
style = "fg:text bg:overlay1"
format = '[$symbol$environment ]($style)'
