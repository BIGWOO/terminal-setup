"$schema" = 'https://starship.rs/config-schema.json'

format = """
[¯éÂ](surface0)\
$username\
$hostname\
[¯é░](bg:blue fg:surface0)\
$directory\
[¯é░](bg:teal fg:blue)\
$git_branch\
$git_status\
[¯é░](fg:teal bg:mauve)\
$php\
$python\
$golang\
$c\
$rust\
$java\
$kotlin\
$haskell\
[¯é░](fg:mauve bg:overlay1)\
