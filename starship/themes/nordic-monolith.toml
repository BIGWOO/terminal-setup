[time]
disabled = false
time_format = "%R"
style = "bg:lavender"
format = '[[ ´É║ $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[ÔØ»](bold fg:teal)'
error_symbol = '[ÔØ»](bold fg:red)'
vimcmd_symbol = '[ÔØ«](bold fg:teal)'
vimcmd_replace_one_symbol = '[ÔØ«](bold fg:lavender)'
vimcmd_replace_symbol = '[ÔØ«](bold fg:lavender)'
vimcmd_visual_symbol = '[ÔØ«](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = "¯½┤ in $duration "
style = "fg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

